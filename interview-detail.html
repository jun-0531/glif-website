<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Interview · GLIF</title>
<meta name="description" content="GLIF Alumni Interview" />
<link rel="icon" type="image/png" href="assets/favicon-32.png" />
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&display=swap" />
<link rel="stylesheet" href="styles.css" />
</head>
<body class="interview-detail-page">

<header class="site-header">
  <a href="index.html" class="brand"><img src="assets/logo-white.png" alt="GLIF" /></a>
  <nav class="nav" id="nav">
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="projects.html">Projects</a>
    <a href="members.html">Members</a>
    <a href="recruit.html" class="active">Recruit</a>
  </nav>
  <button class="nav-toggle" id="navToggle" aria-label="메뉴 열기">&#9776;</button>
</header>

<div class="wrap id-header">
  <p class="id-type" id="idType">— Interview</p>
  <h1 class="id-title" id="idTitle">선배님 Interview</h1>
</div>

<div class="id-slides">
  <div class="wrap" id="idSlides" style="max-width:600px;">
    <!-- 슬라이드 이미지는 JS가 동적 삽입 -->
  </div>
</div>

<div class="wrap" style="padding-bottom:60px;">
  <a href="javascript:history.back()" class="recruit-btn" style="font-size:14px; padding:12px 36px;">← 목록으로 돌아가기</a>
</div>

<footer class="ab-footer">
  <p>성균관대학교 금융투자학회 GLIF<br />
     서울특별시 종로구 성균관로 25-2<br />
     이메일 : <a href="mailto:glifskku1398@gmail.com">glifskku1398@gmail.com</a> &nbsp;/&nbsp; Instagram : <a href="https://instagram.com/glif_skku">@glif_skku</a></p>
  <p class="copy">Copyright 2026 성균관대학교 금융투자학회 GLIF. All rights reserved.</p>
</footer>

<script>
  const navEl = document.getElementById('nav');
  const navTg = document.getElementById('navToggle');
  navTg.addEventListener('click', () => navEl.classList.toggle('open'));
  document.addEventListener('click', e => {
    if (navEl.classList.contains('open') && !navEl.contains(e.target) && e.target !== navTg) {
      navEl.classList.remove('open');
    }
  });

  /* ── 인터뷰 데이터 ── 이름·기수·슬라이드 수 업데이트 시 여기만 수정 */
  const INTERVIEWS = {
    'founder-park': { type: 'Founder Interview', gen: '1기', name: '박재연', slides: 5 },
    'founder-song': { type: 'Founder Interview', gen: '1기', name: '송지용', slides: 5 },
    'founder-ha':   { type: 'Founder Interview', gen: '1기', name: '하재욱', slides: 5 },
    'founder-yang': { type: 'Founder Interview', gen: '1기', name: '양승엽', slides: 5 },
    'alumni-8-1':   { type: 'Alumni Interview',  gen: '8기',  name: '강유진', slides: 7 },
    'alumni-11-1':  { type: 'Alumni Interview',  gen: '11기', name: '류제현', slides: 7 },
    'alumni-12-1':  { type: 'Alumni Interview',  gen: '12기', name: '이현기', slides: 7 },
    'alumni-14-1':  { type: 'Alumni Interview',  gen: '12기', name: '조준우', slides: 7 },
    'alumni-15-1':  { type: 'Alumni Interview',  gen: '15기', name: '신지민', slides: 7 },
    'alumni-17-1':  { type: 'Alumni Interview',  gen: '17기', name: '엄준호', slides: 7 },
  };

  const id  = new URLSearchParams(location.search).get('id') || '';
  const d   = INTERVIEWS[id];

  if (d) {
    document.title = `${d.gen} ${d.name} 선배님 Interview · GLIF`;
    document.getElementById('idType').textContent  = d.type;
    document.getElementById('idTitle').textContent = `${d.gen} ${d.name} 선배님 Interview`;

    const wrap = document.getElementById('idSlides');
    for (let i = 1; i <= d.slides; i++) {
      const num  = String(i).padStart(2, '0');
      const img  = document.createElement('img');
      img.className = 'id-slide';
      img.src       = `assets/interview/${id}/${num}.jpg`;
      img.alt       = `${d.gen} ${d.name} 선배님 인터뷰 슬라이드 ${i}`;
      /* 이미지 없으면 해당 슬라이드 숨김 */
      img.onerror   = function() { this.style.display = 'none'; };
      wrap.appendChild(img);
    }
  } else {
    document.getElementById('idTitle').textContent = '인터뷰를 찾을 수 없습니다.';
  }
</script>
</body>
</html>
