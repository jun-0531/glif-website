<script>
  const navEl = document.getElementById('nav');
  const navTg = document.getElementById('navToggle');
  navTg.addEventListener('click', () => navEl.classList.toggle('open'));
  document.addEventListener('click', e => {
    if (navEl.classList.contains('open') && !navEl.contains(e.target) && e.target !== navTg) {
      navEl.classList.remove('open');
    }
  });

  /* Alumni Interview data — 이름/기수 업데이트 시 여기만 수정 */
  const ALUMNI = [
    { id: 'alumni-8-1',  cardName: '8기 강유진 선배님' },

    { id: 'alumni-15-1', cardName: '15기 신지민 선배님' },
  ];

  const grid = document.getElementById('alumniGrid');
  ALUMNI.forEach(a => {
    grid.innerHTML += `<a href="interview-detail.html?id=${a.id}" class="interview-card" style="background-image:url('assets/interview/${a.id}/01.jpg')"></a>`;
  });
